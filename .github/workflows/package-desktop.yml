name: package-desktop

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel for manifest (e.g. ci/stable/canary)"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: package-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      channel: ${{ steps.channel.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check version sync
        run: ./scripts/check-version-sync.sh

      - name: Read VERSION
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Resolve release channel
        id: channel
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.release_channel }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_CHANNEL}" ]]; then
            echo "value=${INPUT_CHANNEL}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=stable" >> "$GITHUB_OUTPUT"
          else
            echo "value=ci" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    runs-on: macos-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Verify frontend dist
        run: test -f frontend/dist/index.html

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build macOS DMG
        run: ./scripts/build-dmg.sh --version "${{ needs.validate.outputs.version }}" --clean

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pause-macos-universal
          path: build/bin/macos-universal/*.dmg
          if-no-files-found: error
          retention-days: 14

  build-windows:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Verify frontend dist
        run: test -f frontend/dist/index.html

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis mingw-w64

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Windows installer
        run: ./scripts/build-windows-installer.sh --platform windows/amd64 --output-dir build/bin/windows-x64 --clean --no-checksums --no-portable-exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pause-windows-x64
          path: build/bin/windows-x64/*
          if-no-files-found: error
          retention-days: 14

  manifest:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-macos
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pause-macos-universal
          path: build/bin/macos-universal

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pause-windows-x64
          path: build/bin/windows-x64

      - name: Generate release manifest and checksums
        run: |
          ./scripts/generate-release-manifest.sh \
            --version "${{ needs.validate.outputs.version }}" \
            --channel "${{ needs.validate.outputs.channel }}"

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: pause-release-manifest
          path: build/bin/release/*
          if-no-files-found: error
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs:
      - manifest
      - build-macos
      - build-windows
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pause-macos-universal
          path: build/bin/macos-universal

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: pause-windows-x64
          path: build/bin/windows-x64

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: pause-release-manifest
          path: build/bin/release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/bin/macos-universal/*.dmg
            build/bin/windows-x64/*-installer.exe
            build/bin/release/release-manifest.txt
            build/bin/release/SHA256SUMS
